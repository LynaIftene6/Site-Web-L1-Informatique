        <div class="bloc1">
            <img src="img/guntherimg.png" alt="Gunther">
            <figure class="texte1">
                <p><strong>Kleinert</strong> est un artiste qui vit à <strong>Hambourg</strong> en <strong>Allemagne</strong>, il fut formé en <strong>Devon</strong> en <strong>Angleterre</strong> aux <strong>arts de l’ébénisterie</strong>.De retour à Hambourg, il obtient un <strong>diplôme en design industriel à l’université des Beaux-Arts en 2008</strong>. Avec ses <strong>10 ans d’expérience</strong> dans le design, l’architecture d’intérieur et la conception d’objets de toute sorte, il initie des projets innovants et toujours interdisciplinaires en corrélation avec une approche conceptuelle. </p>
                <p>Fasciné par le <strong>“design génératif”</strong>, qui consiste en un affranchissement des contraintes pragmatiques inhérentes au design pour se concentrer uniquement sur l’aspect créatif, Kleinert utilise cette pratique pour créer des partitions sensorielles. </p>
            </figure>
        </div>
        <hr>
        <div class="bloc2">
            <figure class="texte2">
                <p>Pour ce faire, il existe des outils permettant d’ouvrir le champ des possibles, permettant de passer de quelques solutions, ou stratégies d’évitement à une infinité de réponses à un problème donné. Cela nécessite de repenser la place du créateur dans le processus artistique, car les algorithmes viennent générer des réponses et des possibilités par milliers à la place de l’artiste. <a href="../oeuvres/oeuvres.html"><strong class="seeMusic">“I can see music”</strong></a>est issu du design génératif et consiste en des modèles et graphiques générés par la musique.</p>
                <p>Le processus mis en place par Kleinert consiste en <strong>un fichier son</strong> qu’il lance à travers <strong>un code</strong> qui lit et extrait certains <strong>paramètres comme les courbes d’amplitude, de fréquence, le rythme, la dynamique générale etc.</strong> Dans le code, il a défini de quelle manière ces paramètres <strong>doivent se traduire graphiquement</strong> et quel impact ils ont sur les formes géométriques et les lignes créées. Pour finir, il convertit <strong>sortie</strong> pour qu’elle soit <strong>imprimable avec le traceur</strong> et qu’elle définisse la couleur en laissant toujours peu de place aux variations et aux changement de coloris pendant le processus de traçage. </p>                                                                               
            </figure>
